name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t mohan1804/mohan-portfolio:latest .

    - name: Push Docker Image
      run: docker push mohan1804/mohan-portfolio:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop portfolio || true
          docker rm portfolio || true
          docker pull mohan1804/mohan-portfolio:latest
          docker run -d -p 80:80 --name portfolio mohan1804/mohan-portfolio:latest